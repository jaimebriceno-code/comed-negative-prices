<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ComEd Overnight EV Charging Planner</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #172033;
      --text: #e5eefc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --border: rgba(148,163,184,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #08101d 0%, #0f172a 100%);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 32px; margin: 0 0 8px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
    .card {
      grid-column: span 12;
      background: rgba(17,24,39,.88);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,.22);
    }
    .kpi { grid-column: span 3; }
    .wide { grid-column: span 8; }
    .side { grid-column: span 4; }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
    .small { color: var(--muted); font-size: 13px; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
    .tag { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .good { background: rgba(34,197,94,.16); color: #86efac; }
    .warn { background: rgba(245,158,11,.16); color: #fcd34d; }
    .bad { background: rgba(239,68,68,.16); color: #fca5a5; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .bars { display: grid; gap: 10px; margin-top: 10px; }
    .bar-row { display: grid; grid-template-columns: 120px 1fr 72px; gap: 12px; align-items: center; }
    .bar {
      height: 12px; border-radius: 999px; overflow: hidden;
      background: rgba(148,163,184,.14);
    }
    .bar > span { display: block; height: 100%; background: linear-gradient(90deg, #22c55e, #38bdf8); }
    .error { color: #fecaca; white-space: pre-wrap; }
    @media (max-width: 980px) {
      .kpi, .wide, .side { grid-column: span 12; }
      .bar-row { grid-template-columns: 96px 1fr 72px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Overnight EV Charging Planner</h1>
    <div class="sub">Uses your rolling ComEd 5-minute history to estimate the best overnight charging windows, ranked in America/Chicago local time with extra emphasis on the most recent 5 days.</div>

    <div class="grid" id="app">
      <div class="card">Loading feed...</div>
    </div>
  </div>

  <script>
    const DATA_URL = './data/comed_5min_rolling_60d.json';
    const DISPLAY_TIMEZONE = 'America/Chicago';
    const OVERNIGHT_START_HOUR = 21;
    const OVERNIGHT_END_HOUR = 9;
    const SLOT_MINUTES = 30;
    const RECENT_DAYS = 5;
    const RECENT_WEIGHT = 0.70;
    const OLDER_WEIGHT = 0.30;

    function parseTs(s) { return new Date(s); }
    function fmtNum(n, d=2) { return Number(n).toFixed(d); }
    function fmtDate(dt) {
      return dt.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }
    function fmtClockMinutes(mins) {
      const h = Math.floor(mins / 60) % 24;
      const m = mins % 60;
      const ap = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return `${h12}:${String(m).padStart(2,'0')} ${ap}`;
    }
    function chicagoParts(date) {
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: DISPLAY_TIMEZONE,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).formatToParts(date);
      const obj = {};
      for (const p of parts) {
        if (p.type !== 'literal') obj[p.type] = p.value;
      }
      return obj;
    }
    function inOvernight(minutesOfDay) {
      return minutesOfDay >= OVERNIGHT_START_HOUR * 60 || minutesOfDay < OVERNIGHT_END_HOUR * 60;
    }
    function slotLabel(startMins, slotMinutes) {
      return `${fmtClockMinutes(startMins)}–${fmtClockMinutes((startMins + slotMinutes) % 1440)}`;
    }
    function classify(value) {
      if (value < 0) return ['Excellent', 'good'];
      if (value < 2.5) return ['Good', 'good'];
      if (value < 5) return ['Fair', 'warn'];
      return ['Expensive', 'bad'];
    }

    function weightedAverage(recentVals, olderVals) {
      const rCount = recentVals.length;
      const oCount = olderVals.length;
      const rMean = rCount ? recentVals.reduce((a,b)=>a+b,0) / rCount : null;
      const oMean = oCount ? olderVals.reduce((a,b)=>a+b,0) / oCount : null;
      if (rMean !== null && oMean !== null) return RECENT_WEIGHT * rMean + OLDER_WEIGHT * oMean;
      if (rMean !== null) return rMean;
      if (oMean !== null) return oMean;
      return null;
    }

    function buildSlots(items) {
      const latest = new Date(Math.max(...items.map(x => parseTs(x.ts_utc).getTime())));
      const recentCutoff = new Date(latest.getTime() - RECENT_DAYS * 24 * 60 * 60 * 1000);
      const slotMap = new Map();

      for (const item of items) {
        const dt = parseTs(item.ts_utc);
        const cp = chicagoParts(dt);
        const minutes = Number(cp.hour) * 60 + Number(cp.minute);
        if (!inOvernight(minutes)) continue;
        const slotStart = Math.floor(minutes / SLOT_MINUTES) * SLOT_MINUTES;
        const key = String(slotStart);
        if (!slotMap.has(key)) {
          slotMap.set(key, { slotStart, recent: [], older: [], all: [] });
        }
        const bucket = slotMap.get(key);
        bucket.all.push(item.price);
        if (dt >= recentCutoff) bucket.recent.push(item.price);
        else bucket.older.push(item.price);
      }

      const slots = Array.from(slotMap.values()).map(s => {
        const weighted = weightedAverage(s.recent, s.older);
        const avgAll = s.all.length ? s.all.reduce((a,b)=>a+b,0) / s.all.length : null;
        return {
          ...s,
          weighted,
          avgAll,
          sampleCount: s.all.length,
          recentCount: s.recent.length,
          olderCount: s.older.length,
          label: slotLabel(s.slotStart, SLOT_MINUTES)
        };
      }).filter(s => s.weighted !== null)
        .sort((a,b) => a.weighted - b.weighted);

      return { slots, latest, recentCutoff };
    }

    function bestWindow(slots, windowSlots) {
      let best = null;
      const ordered = [...slots].sort((a,b)=>a.slotStart-b.slotStart);
      for (let i=0; i<=ordered.length-windowSlots; i++) {
        const slice = ordered.slice(i, i + windowSlots);
        let contiguous = true;
        for (let j=1; j<slice.length; j++) {
          const prev = slice[j-1].slotStart;
          const curr = slice[j].slotStart;
          if (((prev + SLOT_MINUTES) % 1440) !== curr) {
            contiguous = false;
            break;
          }
        }
        if (!contiguous) continue;
        const score = slice.reduce((a,b)=>a+b.weighted,0) / slice.length;
        const start = slice[0].slotStart;
        const end = (slice[slice.length-1].slotStart + SLOT_MINUTES) % 1440;
        const cand = { score, start, end, labels: slice.map(x=>x.label) };
        if (!best || cand.score < best.score) best = cand;
      }
      return best;
    }

    function topNegatives(items) {
      return items.filter(x => x.price < 0).length;
    }

    function render(data) {
      const app = document.getElementById('app');
      const items = data.items || [];
      const { slots, latest, recentCutoff } = buildSlots(items);
      const best2h = bestWindow(slots, 4);
      const best3h = bestWindow(slots, 6);
      const best4h = bestWindow(slots, 8);
      const recentNeg = items.filter(x => new Date(x.ts_utc) >= recentCutoff && x.price < 0).length;
      const overallNeg = topNegatives(items);
      const top5 = slots.slice(0, 5);
      const worst5 = [...slots].sort((a,b)=>b.weighted-a.weighted).slice(0, 5);
      const minWeighted = Math.min(...slots.map(s=>s.weighted));
      const maxWeighted = Math.max(...slots.map(s=>s.weighted));
      const range = Math.max(0.0001, maxWeighted - minWeighted);

      function recCard(title, rec) {
        if (!rec) return `<div class="card"><div class="label">${title}</div><div class="value">Not enough data</div></div>`;
        const cls = classify(rec.score);
        return `
          <div class="card kpi">
            <div class="label">${title}</div>
            <div class="value mono">${fmtClockMinutes(rec.start)}–${fmtClockMinutes(rec.end)}</div>
            <div class="small">Weighted avg ${fmtNum(rec.score)}¢/kWh</div>
            <div class="small"><span class="tag ${cls[1]}">${cls[0]}</span></div>
          </div>`;
      }

      app.innerHTML = `
        <div class="card kpi">
          <div class="label">Feed updated</div>
          <div class="value">${fmtDate(new Date(data.updated_at))}</div>
          <div class="small">Coverage ${fmtDate(new Date(data.coverage_start))} → ${fmtDate(new Date(data.coverage_end))}</div>
        </div>
        <div class="card kpi">
          <div class="label">Records</div>
          <div class="value">${data.item_count.toLocaleString()}</div>
          <div class="small">Rolling 60-day 5-minute feed</div>
        </div>
        <div class="card kpi">
          <div class="label">Negative intervals</div>
          <div class="value">${overallNeg.toLocaleString()}</div>
          <div class="small">${recentNeg.toLocaleString()} in the recent 5-day weighting window</div>
        </div>
        <div class="card kpi">
          <div class="label">Weight model</div>
          <div class="value">70 / 30</div>
          <div class="small">70% recent 5 days, 30% older days in the rolling feed</div>
        </div>

        ${recCard('Best 2-hour target', best2h)}
        ${recCard('Best 3-hour target', best3h)}
        ${recCard('Best 4-hour target', best4h)}

        <div class="card wide">
          <div class="label">Best overnight half-hour slots</div>
          <div class="small">These slot scores use a weighted average of observed 5-minute prices for each overnight half-hour bucket in America/Chicago local time. More recent behavior gets 70% of the weight. ComEd says EV charging is typically cheapest overnight, especially around 1 a.m. to 5 a.m. [web:202]</div>
          <div class="bars">
            ${top5.map(s => {
              const width = 10 + ((maxWeighted - s.weighted) / range) * 90;
              const cls = classify(s.weighted);
              return `
                <div class="bar-row">
                  <div class="mono">${s.label}</div>
                  <div class="bar"><span style="width:${width}%"></span></div>
                  <div><span class="tag ${cls[1]}">${fmtNum(s.weighted)}¢</span></div>
                </div>`;
            }).join('')}
          </div>
        </div>

        <div class="card side">
          <div class="label">How the score works</div>
          <table>
            <tr><th>Component</th><th>Rule</th></tr>
            <tr><td>Window</td><td>Overnight only, 9 PM to 9 AM Chicago time</td></tr>
            <tr><td>Bucket</td><td>30-minute slot</td></tr>
            <tr><td>Recent weight</td><td>70% from the last 5 days</td></tr>
            <tr><td>Older weight</td><td>30% from the earlier days in the rolling file</td></tr>
            <tr><td>Target</td><td>Lower weighted average = better charging time</td></tr>
          </table>
          <div class="small">Ranking uses America/Chicago local time. The underlying feed still stores timestamps in UTC.</div>
        </div>

        <div class="card wide">
          <div class="label">Top 10 overnight slots</div>
          <table>
            <tr>
              <th>Rank</th>
              <th>Slot</th>
              <th>Weighted avg</th>
              <th>Recent avg</th>
              <th>Older avg</th>
              <th>Samples</th>
              <th>Status</th>
            </tr>
            ${slots.slice(0,10).map((s, idx) => {
              const recentAvg = s.recentCount ? s.recent.reduce((a,b)=>a+b,0)/s.recentCount : null;
              const olderAvg = s.olderCount ? s.older.reduce((a,b)=>a+b,0)/s.olderCount : null;
              const cls = classify(s.weighted);
              return `
                <tr>
                  <td>${idx+1}</td>
                  <td class="mono">${s.label}</td>
                  <td>${fmtNum(s.weighted)}¢</td>
                  <td>${recentAvg === null ? '—' : fmtNum(recentAvg)+'¢'}</td>
                  <td>${olderAvg === null ? '—' : fmtNum(olderAvg)+'¢'}</td>
                  <td>${s.sampleCount}</td>
                  <td><span class="tag ${cls[1]}">${cls[0]}</span></td>
                </tr>`;
            }).join('')}
          </table>
        </div>

        <div class="card side">
          <div class="label">Highest-cost overnight slots</div>
          <table>
            <tr><th>Slot</th><th>Weighted avg</th></tr>
            ${worst5.map(s => `
              <tr>
                <td class="mono">${s.label}</td>
                <td>${fmtNum(s.weighted)}¢</td>
              </tr>`).join('')}
          </table>
          <div class="small">Use these as “avoid unless needed” periods for overnight charging.</div>
        </div>
      `;
    }

    async function main() {
      const app = document.getElementById('app');
      try {
        const r = await fetch(DATA_URL);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        render(data);
      } catch (err) {
        app.innerHTML = `<div class="card"><div class="label">Error</div><div class="error">Could not load ${DATA_URL}\n\n${err.message}</div></div>`;
      }
    }

    main();
  </script>
</body>
</html>
